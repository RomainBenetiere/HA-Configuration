- id: '1756564943530'
  alias: Gestion volets (soleil & températures)
  description: Automation unique Est/Sud/Ouest
  triggers:
  - entity_id: sun.sun
    attribute: azimuth
    trigger: state
  - entity_id: sun.sun
    attribute: elevation
    trigger: state
  - entity_id:
    - sensor.temp_hr_jardin_temperature
    - sensor.temp_hr_chambre_temperature
    - sensor.temp_hr_salon_temperature
    trigger: state
  - minutes: /5
    trigger: time_pattern
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ az > az_ne and az < az_se\n   and t_ext_max > t_ext_min\n
          \  and elev > ang_min\n   and t_chambre > t_int_max }}\n"
      sequence:
      - target:
          entity_id: cover.volet_roulant_cham_parents
        action: cover.close_cover
        data: {}
    - conditions:
      - condition: template
        value_template: "{{ az > az_se and az < az_s\n   and t_ext_max > t_ext_min\n
          \  and elev > ang_min\n   and t_salon > t_int_max }}\n"
      sequence:
      - target:
          entity_id: cover.volet_roulant_cham_arthur
        action: cover.close_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_cham_elliot
        action: cover.close_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_sam_1
        action: cover.close_cover
        data: {}
    - conditions:
      - condition: template
        value_template: "{{ az > az_o and az < az_no\n   and t_ext_max > t_ext_min\n
          \  and elev > ang_min\n   and t_salon > t_int_max }}\n"
      sequence:
      - target:
          entity_id: cover.volet_roulant_sam_2
        action: cover.close_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_salon
        action: cover.close_cover
        data: {}
      - target:
          entity_id: cover.volets_roulants_buanderie
        action: cover.close_cover
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ sunset is not none and (now() +

          timedelta(minutes=30)).strftime(''%H:%M:%S'') > as_datetime(sunset) and
          (now() +

          timedelta(minutes=15)).strftime(''%H:%M:%S'') < as_datetime(sunset)

          }}

          '
      sequence:
      - target:
          entity_id: cover.volet_roulant_sam_2
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_salon
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volets_roulants_buanderie
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_cham_arthur
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_cham_elliot
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_sam_1
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_cham_parents
        action: cover.open_cover
        data: {}
    - conditions:
      - condition: and
        conditions:
        - condition:
          - condition: template
            value_template: '{{ now().hour >= 10 and (now() + timedelta(minutes=10)).strftime(''%H:%M:%S'')
              < as_datetime(sunset)}} '
          - condition: template
            value_template: '{{ az >= az_no }}'
          - condition: template
            value_template: '{{ t_salon <= t_int_min }}'
      sequence:
      - target:
          entity_id: cover.volet_roulant_sam_2
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_salon
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volets_roulants_buanderie
        action: cover.open_cover
        data: {}
    - conditions:
      - condition: and
        conditions:
        - condition:
          - condition: template
            value_template: '{{ now().hour >= 10 and (now() + timedelta(minutes=10)).strftime(''%H:%M:%S'')
              < as_datetime(sunset)}} '
          - condition: template
            value_template: '{{ az > (az_s + 10)}}'
          - condition: template
            value_template: '{{t_salon <= t_int_min }}'
      sequence:
      - target:
          entity_id: cover.volet_roulant_cham_arthur
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_cham_elliot
        action: cover.open_cover
        data: {}
      - target:
          entity_id: cover.volet_roulant_sam_1
        action: cover.open_cover
        data: {}
    - conditions:
      - condition: and
        conditions:
        - condition:
          - condition: template
            value_template: '{{ now().hour >= 10 and (now() + timedelta(minutes=10)).strftime(''%H:%M:%S'')
              < as_datetime(sunset)}} '
          - condition: template
            value_template: '{{ az > az_s }}'
          - condition: template
            value_template: '{{t_chambre <= t_int_min }}'
      sequence:
      - target:
          entity_id: cover.volet_roulant_cham_parents
        action: cover.open_cover
        data: {}
    default: []
  mode: single
  variables:
    az: '{{ state_attr(''sun.sun'',''azimuth'') | float(0) }}'
    elev: '{{ state_attr(''sun.sun'',''elevation'') | float(-90) }}'
    sunset: '{{ state_attr(''sun.sun'',''next_setting'') }}'
    t_ext_max: '{{ states(''sensor.temp_hr_jardin_temperature'') | float(-100) }}'
    t_chambre: '{{ states(''sensor.temp_hr_chambre_temperature'') | float(-100) }}'
    t_salon: '{{ states(''sensor.temp_hr_salon_temperature'') | float(-100) }}'
    az_ne: '{{ states(''input_number.azimuth_ne'') | float(0) }}'
    az_se: '{{ states(''input_number.azimuth_se'') | float(0) }}'
    az_s: '{{ states(''input_number.azimuth_s'')  | float(0) }}'
    az_o: '{{ states(''input_number.azimuth_o'')  | float(0) }}'
    az_no: '{{ states(''input_number.azimuth_no'') | float(0) }}'
    ang_min: '{{ states(''input_number.angle_soleil'') | float(0) }}'
    t_ext_min: '{{ states(''input_number.temperature_exterieure_min'') | float(0)
      }}'
    t_int_max: '{{ states(''input_number.temperature_interieure_max'') | float(0)
      }}'
    t_int_min: '{{ states(''input_number.temperature_interieure_min'') | float(0)
      }}'
