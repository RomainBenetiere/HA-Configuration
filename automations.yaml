- id: '1724310675473'
  alias: charge_start
  description: Charge Voiture Elec
  triggers:
  - entity_id: binary_sensor.power_excess
    trigger: state
  - entity_id: binary_sensor.power_shortage
    trigger: state
  - at: 03:00:00
    trigger: time
  - at: 06:54:00
    trigger: time
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.power_excess
        state: 'on'
      - condition: state
        entity_id: switch.charge_voiture
        state: 'off'
      - condition: time
        before: '18:00:00'
        after: 07:00:00
      sequence:
      - entity_id: switch.charge_voiture
        action: switch.turn_on
    - conditions:
      - condition: state
        entity_id: binary_sensor.power_shortage
        state: 'on'
      - condition: state
        entity_id: switch.charge_voiture
        state: 'on'
      - condition: time
        before: '18:00:00'
        after: 07:00:00
      sequence:
      - entity_id: switch.charge_voiture
        action: switch.turn_off
    - conditions:
      - condition: time
        after: 02:59:59
        before: 06:53:59
      - condition: state
        entity_id: switch.charge_voiture
        state: 'off'
      sequence:
      - action: switch.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: switch.charge_voiture
    - conditions:
      - condition: time
        after: 06:53:59
        before: '10:00:00'
      - condition: state
        entity_id: switch.charge_voiture
        state: 'on'
      sequence:
      - action: switch.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: switch.charge_voiture
  initial_state: true
