- id: '1696796989499'
  alias: Lumiere Conso
  description: ''
  triggers:
  - trigger: state
    id: hue_change
    entity_id:
    - sensor.color_hue
  - trigger: time_pattern
    id: every5
    minutes: /5
  - trigger: state
    id: carillon_pressed
    entity_id: binary_sensor.carillon
  conditions: []
  actions:
  - variables:
      light_target: light.lampeconso_led_strip
      hue_sensor: sensor.color_hue
      effect_name: strobe
  - choose:
    - conditions:
      - condition: trigger
        id: carillon_pressed
      sequence:
      - data:
          scene_id: snapshot_lampeconso_avant_strobe
          snapshot_entities:
          - '{{ light_target }}'
        action: scene.create
      - target:
          entity_id: '{{ light_target }}'
        data:
          effect: '{{ effect_name }}'
          brightness: 255
        action: light.turn_on
      - delay: 00:00:20
      - target:
          entity_id: scene.snapshot_lampeconso_avant_strobe
        action: scene.turn_on
        data: {}
    default:
    - if:
      - condition: time
        after: 07:00:00
        before: '23:00:00'
      then:
      - if:
        - condition: numeric_state
          entity_id: sensor.color_hue
          above: -0.1
          below: 240.1
        then:
        - data:
            hs_color:
            - '{{ states(''sensor.color_hue'') | int }}'
            - 100
          target:
            entity_id: light.lampeconso_led_strip
          action: light.turn_on
        else:
        - if:
          - condition: numeric_state
            entity_id: sensor.color_hue
            below: 1
          then:
          - data:
              hs_color:
              - 0
              - 100
            target:
              entity_id: light.lampeconso_led_strip
            action: light.turn_on
          - if:
            - condition: numeric_state
              entity_id: sensor.color_hue
              above: 240
            then:
            - data:
                hs_color:
                - 240
                - 100
              target:
                entity_id: light.lampeconso_led_strip
              action: light.turn_on
      else:
      - target:
          entity_id: light.lampeconso_led_strip
        action: light.turn_off
        data: {}
  mode: single
