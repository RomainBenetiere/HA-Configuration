esphome:
  name: lampesalon
  friendly_name: LampeSalon

rp2040:
  board: rpipicow

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "pJv0w6bRc792R6DKup6K9XC2E2KuC+p52uT55qWG+rY="

ota:
  - platform: esphome
    password: "5ffc8eeeaf6367ccfdd36883da5eefad"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.0.16
    gateway: 192.168.0.1
    subnet: 255.255.255.0

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Lampesalon Fallback Hotspot"
    password: "DS6P4KBe0VBU"

light:
  - platform: rp2040_pio_led_strip
    name: CJMCU_8_8
    id: CJMCU_8_8
    pin: 0
    num_leds: 64
    pio: 0
    rgb_order: GRB
    chipset: WS2812B
    effects:
      # Use default parameters:
      - random:
      # Customize parameters
      - random:
          name: "My Slow Random Effect"
          transition_length: 30s
          update_interval: 30s
      - random:
          name: "My Fast Random Effect"
          transition_length: 4s
          update_interval: 5s
      - pulse:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          # transition_length: 1s      # defaults to 1s
          update_interval: 2s
      - strobe:
      - strobe:
          name: Strobe Effect With Custom Values
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 100%
              blue: 100%
              duration: 100ms
            - state: false
              duration: 50ms

sensor: 
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s  

