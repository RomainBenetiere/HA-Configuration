esphome:
  name: lampeconso
  friendly_name: LampeCouleurConso

rp2040:
  board: rpipicow
  #framework:
    # Required until https://github.com/platformio/platform-raspberrypi/pull/36 is merged
    #platform_version: https://github.com/maxgerhardt/platform-raspberrypi.git

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "y4JmxP2k/lDcGR9JdHjh+Njs4dpMkLetNQI8HH+3Yh8="

ota:
  platform: esphome
  password: "0188485e39f0000b984be09b7eb99873"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.0.30
    gateway: 192.168.0.1
    subnet: 255.255.255.0

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Picow Fallback Hotspot"
    password: "pBWroO3SMzgJ"

light:
  - platform: rp2040_pio_led_strip
    name: led_strip
    id: led_strip
    pin: 0
    num_leds: 60
    pio: 0
    rgb_order: GRB
    chipset: WS2812B
    effects:
      # Use default parameters:
      - random:
      # Customize parameters
      - random:
          name: "My Slow Random Effect"
          transition_length: 30s
          update_interval: 30s
      - random:
          name: "My Fast Random Effect"
          transition_length: 4s
          update_interval: 5s
      - pulse:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          # transition_length: 1s      # defaults to 1s
          update_interval: 2s
      - strobe:
      - strobe:
          name: Strobe Effect With Custom Values
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 100%
              blue: 100%
              duration: 50ms
            - state: false
              duration: 25ms

sensor: 
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s  

