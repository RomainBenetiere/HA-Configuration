input_number:
  pool_length:   { name: "Longueur Piscine",min: 1, max: 10, step: 0.1, mode: box }
  pool_width: { name: "Largeur Piscine", min: 1,max: 5,step: 0.1,  mode: box }
  pool_depth:  { name: "Profondeur Piscine", min: 0.2, max: 3, step: 0.1, mode: box }
  wind_speed: { name: "Vitesse Vent", min: 0.0, max: 10, step: 0.1, mode: box }

template:
  - sensor:
      - name: "Pool Evap Rate cm_j"
        unit_of_measurement: "cm/j"
        state_class: measurement
        state: >
          {% set T_pool = states('sensor.piscine_temperature')|float(0) %}
          {% set T_air  = states('sensor.temp_hr_jardin_temperature')|float(0) %}
          {% set RH     = states('sensor.temp_hr_jardin_humidite')|float(0) %}
          {% set Wind   = states('input_number.wind_speed')|float(0) %}
          {{ ((
            -1.8286596122
            + (-0.107160555  * T_pool)
            + ( 0.170008885  * T_air )
            + ( 0.03148153   * RH    )
            + ( 0.288135687  * Wind  )
            + ( 0.002857683  * T_pool**2 )
            + (-0.00007553593 * T_pool * T_air )
            + (-0.000022719337 * T_pool * RH )
            + ( 0.0208429439  * T_pool * Wind )
            + (-0.00195139068 * T_air**2 )
            + (-0.00131490867 * T_air * RH )
            + (-0.0152268257  * T_air * Wind )
            + (-0.00457985172 * RH * Wind )
          )/10*24) | round(3) }}
      - name: "Pool Evap Mass kg_h"
        unit_of_measurement: "kg/h"
        state_class: measurement
        state: >
          {% set rate = states('sensor.pool_evap_rate_cm_j')|float(0) %}
          {% set L = states('input_number.pool_length')|float(0) %}
          {% set W = states('input_number.pool_width')|float(0) %}
          {{ (rate * L * W * 10 / 24) | round(2) }}
      - name: "Pool Temp Drop C_per_h"
        unit_of_measurement: "°C/h"
        state_class: measurement
        state: >
          {% set m_evap = states('sensor.pool_evap_mass_kg_h')|float(0) %}
          {% set T_pool = states('sensor.piscine_temperature')|float(0) %}
          {% set L = states('input_number.pool_length')|float(0) %}
          {% set W = states('input_number.pool_width')|float(0) %}
          {% set D = states('input_number.pool_depth')|float(0) %}
          {% set h_fg = 2501 - 2.361 * T_pool %}
          {% set volume = L * W * D %}
          {% if volume == 0 %}
            0
          {% else %}
            {{ ((m_evap * h_fg) / (volume * 1000 * 4.18)) | round(4) }}
          {% endif %}